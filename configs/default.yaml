budgets:
  context_tokens_per_session: 120000
  inference_calls_per_session: 80
  wall_clock_minutes: 45
  dream_cycles_per_day: 3
  exploration_reserve_pct: 15

# Optional low-information stop words used by the deterministic seed/tension linker.
stop_words:
  - data
  - value
  - values
  - using
  - like
  - also
  - e.g
  - etc
  - use
  - used
  - get
  - set
  - one
  - two
  - new
  - see
  - way
  - make
  - still
  - even
  - work
  - works
  - none
  - true
  - false

pressure:
  weights:
    uncertainty: 1.4
    impact: 1.2
    contradiction: 1.0
    deadline: 0.8
    blockers: 0.6
    recent_failures: 0.5
    known_solution: -0.9
  thresholds:
    incubate: 0.72
    monitor: 0.45
    archive: 0.35
    archive_cycles: 3

urgency:
  weights:
    impact: 1.0
    severity: 1.0
    elapsed_days: 0.5
    deadline_pressure: 1.5
    dependency_centrality: 0.8
    escalation: 0.6
    deterioration: 0.7
    reversibility: -0.5

goal_pipeline:
  min_recurrence: 5
  min_incubation_cycles: 3
  commitment_threshold: 0.65
  social_resistance_weight: 0.3
  switch_cost_weight: 0.2
  min_shared_tags: 2        # minimum overlapping tags to count as cluster
  min_linked_tensions: 3    # must be linked to at least N tensions to commit
  min_hit_rate: 0.05        # must be relevant to >= 5% of tensions
  max_hit_rate: 0.70        # reject if relevant to > 70% (too generic)
  min_coherence: 0.3        # minimum coherence score to attempt commitment

crystallization:
  weights:
    compression: 0.30
    constraint_satisfaction: 0.25
    novelty: 0.20
    cross_domain_distance: 0.15
    verifier_agreement: 0.10
  gates:
    min_verifier: 0.80
    min_constraint: 0.70
    min_compression: 0.55
    novelty_range: [0.35, 0.90]

affect:
  distress_decay: 0.95
  relief_decay: 0.90
  wireheading_penalty: 0.5
  slack_loss_threshold: 0.7

model:
  backend: mock  # mock | ollama | openai

  # --- OpenAI-compatible API (uncomment to use) ---
  # backend: openai
  # api_key: sk-...           # or set SIA_API_KEY env var
  # base_url: https://api.openai.com/v1
  # model: gpt-4o
  # temperature: 0.3
  # max_tokens: 4096

  # --- Azure OpenAI ---
  # backend: openai
  # api_key: your-azure-key
  # base_url: https://your-resource.openai.azure.com/openai/deployments/your-deployment
  # model: gpt-4o

  # --- Groq ---
  # backend: openai
  # api_key: gsk_...
  # base_url: https://api.groq.com/openai/v1
  # model: llama-3.1-70b-versatile

  # --- Local (Ollama OpenAI-compatible, LM Studio, vLLM) ---
  # backend: openai
  # base_url: http://localhost:11434/v1
  # model: llama3.1:8b-instruct
  # api_key: not-needed

  ollama_model: llama3.1:8b-instruct
  temperature: 0.7
